version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: filmtracker-postgres
    restart: always
    environment:
      POSTGRES_DB: filmtracker_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - filmtracker_postgres_data:/var/lib/postgresql/data

volumes:
  filmtracker_postgres_data: